name: Security Header Checker
description: Scan a URL with Security Header Checker CLI and gate CI by grade.

inputs:
  url:
    description: URL to scan (for example https://example.com)
    required: true
  fail-under:
    description: Minimum acceptable grade (A-F, plus/minus supported)
    required: false
    default: ""
  api-key:
    description: API key for authenticated requests (recommended in CI)
    required: false
    default: ""
  timeout:
    description: Request timeout in milliseconds
    required: false
    default: "15000"
  api-base-url:
    description: Security Header Checker API base URL
    required: false
    default: "https://security-header-checker.vercel.app"

outputs:
  grade:
    description: Returned grade (A-F)
    value: ${{ steps.parse.outputs.grade }}
  score:
    description: Numeric score returned by the scan
    value: ${{ steps.parse.outputs.score }}
  report-url:
    description: Shared report URL (when share creation succeeds)
    value: ${{ steps.parse.outputs.report_url }}

runs:
  using: composite
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: "20"

    - name: Install CLI dependencies
      shell: bash
      run: |
        npm ci --no-audit --no-fund --prefix "$GITHUB_ACTION_PATH/../../../packages/cli"

    - id: run_cli
      name: Run security header scan
      shell: bash
      run: |
        set +e

        CLI_PATH="$GITHUB_ACTION_PATH/../../../packages/cli/bin/security-header-checker.js"
        args=(
          "${{ inputs.url }}"
          "--json"
          "--timeout" "${{ inputs.timeout }}"
          "--api-base-url" "${{ inputs.api-base-url }}"
        )

        if [ -n "${{ inputs.fail-under }}" ]; then
          args+=("--fail-under" "${{ inputs.fail-under }}")
        fi

        if [ -n "${{ inputs.api-key }}" ]; then
          args+=("--api-key" "${{ inputs.api-key }}")
        fi

        cli_output="$(node "$CLI_PATH" "${args[@]}")"
        cli_exit_code="$?"

        {
          echo "cli_exit_code=$cli_exit_code"
          echo "cli_json<<__SECURITY_HEADERS_CLI_JSON__"
          echo "$cli_output"
          echo "__SECURITY_HEADERS_CLI_JSON__"
        } >> "$GITHUB_OUTPUT"

        exit 0

    - id: parse
      name: Build outputs and summary
      shell: bash
      env:
        CLI_JSON: ${{ steps.run_cli.outputs.cli_json }}
        CLI_EXIT_CODE: ${{ steps.run_cli.outputs.cli_exit_code }}
        INPUT_URL: ${{ inputs.url }}
        INPUT_FAIL_UNDER: ${{ inputs.fail-under }}
        INPUT_API_BASE_URL: ${{ inputs.api-base-url }}
      run: |
        node <<'NODE'
        const fs = require("node:fs");

        (async () => {
          const outputPath = process.env.GITHUB_OUTPUT;
          const summaryPath = process.env.GITHUB_STEP_SUMMARY;
          const apiBaseUrl = process.env.INPUT_API_BASE_URL || "https://security-header-checker.vercel.app";
          const inputUrl = process.env.INPUT_URL || "";
          const minimumGrade = (process.env.INPUT_FAIL_UNDER || "").trim().toUpperCase();
          const cliExitCode = Number(process.env.CLI_EXIT_CODE || "1");

          const marker = "<!-- security-header-checker-comment -->";

          function setOutput(name, value) {
            fs.appendFileSync(outputPath, `${name}<<__OUTPUT__\n${value || ""}\n__OUTPUT__\n`);
          }

          function gradeRank(value) {
            const map = {
              "A+": 13, A: 12, "A-": 11,
              "B+": 10, B: 9, "B-": 8,
              "C+": 7, C: 6, "C-": 5,
              "D+": 4, D: 3, "D-": 2,
              F: 1
            };
            return map[String(value || "").trim().toUpperCase()] || 0;
          }

          function icon(status) {
            if (status === "good") return "✅";
            if (status === "weak") return "⚠️";
            return "❌";
          }

          let payload = {};
          try {
            payload = JSON.parse(process.env.CLI_JSON || "{}");
          } catch {
            payload = { ok: false, error: "CLI returned invalid JSON output." };
          }

          const report = payload && typeof payload === "object" ? payload.report : null;
          const grade = report && typeof report.grade === "string" ? report.grade : "";
          const score = report && typeof report.score !== "undefined" ? String(report.score) : "";

          const thresholdSatisfied = minimumGrade
            ? gradeRank(grade) >= gradeRank(minimumGrade)
            : true;
          const scanOk = cliExitCode === 0 && Boolean(report) && thresholdSatisfied;

          let reportUrl = "";
          if (report) {
            try {
              const shareResponse = await fetch(new URL("/api/reports/share", apiBaseUrl), {
                method: "POST",
                headers: {
                  "content-type": "application/json"
                },
                body: JSON.stringify({
                  version: 1,
                  mode: "single",
                  report
                })
              });

              if (shareResponse.ok) {
                const shareBody = await shareResponse.json();
                if (shareBody && typeof shareBody.path === "string") {
                  reportUrl = new URL(shareBody.path, apiBaseUrl).toString();
                }
              }
            } catch {
              reportUrl = "";
            }
          }

          const resultsTable = Array.isArray(report?.results)
            ? report.results
                .slice(0, 20)
                .map((result) => {
                  const label = result?.label || result?.key || "header";
                  const status = result?.status || "missing";
                  return `| ${icon(status)} ${label} | ${status} |`;
                })
                .join("\n")
            : "";

          const headline = scanOk
            ? "### ✅ Security header scan passed"
            : "### ❌ Security header scan failed";
          const gateText = minimumGrade
            ? `Gate: \`${grade || "n/a"}\` (minimum \`${minimumGrade}\`)`
            : `Gate: \`${grade || "n/a"}\``;
          const reportLine = reportUrl ? `Report: [Open shared report](${reportUrl})` : "Report: _not generated_";
          const errorLine =
            payload && typeof payload.error === "string" ? `Error: \`${payload.error}\`` : "";

          const commentParts = [
            marker,
            headline,
            "",
            `URL: \`${inputUrl}\``,
            `Grade: \`${grade || "n/a"}\``,
            `Score: \`${score || "n/a"}\``,
            gateText,
            reportLine,
            errorLine
          ].filter(Boolean);

          if (resultsTable) {
            commentParts.push(
              "",
              "| Header | Status |",
              "| --- | --- |",
              resultsTable
            );
          }

          const commentBody = `${commentParts.join("\n")}\n`;

          setOutput("grade", grade);
          setOutput("score", score);
          setOutput("report_url", reportUrl);
          setOutput("comment_body", commentBody);
          setOutput("should_fail", scanOk ? "false" : "true");
          fs.appendFileSync(summaryPath, commentBody);
        })().catch((error) => {
          const message = error instanceof Error ? error.message : String(error);
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `should_fail=true\n`);
          fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, `Security Header Checker action error: ${message}\n`);
          process.exit(0);
        });
        NODE

    - name: Comment on pull request
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v7
      env:
        COMMENT_BODY: ${{ steps.parse.outputs.comment_body }}
      with:
        script: |
          const marker = "<!-- security-header-checker-comment -->";
          const body = process.env.COMMENT_BODY || "";
          const { owner, repo } = context.repo;
          const issue_number = context.issue.number;

          const { data: comments } = await github.rest.issues.listComments({
            owner,
            repo,
            issue_number,
            per_page: 100
          });

          const existing = comments.find((comment) => {
            return comment.user?.type === "Bot" && comment.body?.includes(marker);
          });

          if (existing) {
            await github.rest.issues.updateComment({
              owner,
              repo,
              comment_id: existing.id,
              body
            });
          } else {
            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number,
              body
            });
          }

    - name: Enforce scan gate
      if: steps.parse.outputs.should_fail == 'true'
      shell: bash
      run: |
        echo "Security header gate failed."
        exit 1
